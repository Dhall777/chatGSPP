<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>chatGSPP (demo UI)</title>
</head>
<body>
    <h1>chatGSPP demo</h1>
    <form method="post" action="/">
        <input type="text" name="message" placeholder="Ask me anything about GSPP..." required>
        <button type="submit">Send</button>
    </form>
    {% if response %}
        <div class="response">
            <h2>Response:</h2>
            <p>{{ response }}</p>
        </div>
    {% endif %}
</body>
</html>
